# CosmOS — главный конфиг
# Переносимый файл. Секреты — в .env, не здесь.

project:
  name: CosmOS
  version: 0.1.0
  root: ~/Sync/GPT/CosmOS

# Удалённые хосты (SSH-агенты)
remote_hosts:
  geekom:
    host: 10.10.10.13
    user: astroill
    port: 22
    key: ~/.ssh/id_rsa
    agents: [opencode]
    shell_env:
      PATH: /home/astroill/.opencode/bin:$PATH
  kz:
    host: 45.152.87.160
    user: n8n
    port: 22
    key: ~/.ssh/ilyash
    agents: [opencode]
    shell_env:
      PATH: /home/n8n/.opencode/bin:$PATH
  relaxagent:
    host: 203.161.41.197
    user: agent
    port: 22
    key: ~/.ssh/relaxagent
    agents: [opencode]

# Подключённые агенты
agents:
  default: hermes
  hermes:
    command: hermes
    timeout_sec: 600
  claude:
    command: claude
    timeout_sec: 600
  codex:
    command: codex
    timeout_sec: 600
  opencode:
    command: opencode
    timeout_sec: 600
    enabled: true

# Интерфейсы
interfaces:
  cli:
    enabled: true
  api:
    enabled: true
    host: 127.0.0.1
    port: 7455
    api_key: "${COSMOS_API_KEY}"
    cors_origins: []
  web:
    enabled: false
    port: 8401
    host: "0.0.0.0"
  telegram:
    enabled: true
    bot_token: "${COSMOS_TELEGRAM_BOT_TOKEN}"
    allowed_user_ids: [306493996]
    polling_interval: 3

# Память
memory:
  sqlite:
    enabled: true
    path: data/cosmos.sqlite
  obsidian:
    enabled: true
    vault_path: ~/Sync/Obsidian/Mobile
    notes_folder: CosmOS
  mem0:
    enabled: false
  vector:
    enabled: false

# Выполнение
execution:
  default_timeout_sec: 600
  use_worktrees: true
  verify_results: true
  max_concurrent_tasks: 3

# Логирование
logging:
  level: INFO
  dir: data/logs
  max_file_size_mb: 10
  keep_days: 30
